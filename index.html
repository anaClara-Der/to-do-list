<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
</head>
<body>
    <h2 id="fecha"></h4>
    <div id="container">
        <form class="listado">
            <h2 class="listado-titulo">Tareas</h2>
            <label class= "color-label"for="color">Agrega color a tu nota si lo deseas</label>
            <input type="color" id="color" value="#FFF8DC">
            <textarea  class="tarea" cols="30" rows="10" placeholder="Escribir tarea"></textarea>
            <button type="button" class="boton-listado">Agregar tarea</button>
        </form>
        <div class="tareas-hacer">
           <ul class="tareas-hacer-ul">
          
           </ul>
        </div>
    </div>
    <script src="https://kit.fontawesome.com/d9e2ae4403.js" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
